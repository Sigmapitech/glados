name: Haskell Coverage

on:
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup dev shell
        run: nix develop --command echo "Nix develop environment loaded"

      - name: Run tests with coverage
        run: nix develop --command cabal test --enable-coverage

      - name: Generate Codecov artifact
        run: |
          nix develop --command bash -c '
            mkdir -p coverage

            hpc-codecov cabal:lisp-interpreter-test > coverage/codecov.json
          '

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
